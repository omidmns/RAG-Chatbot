version: '3'
services:
  app:
    build: ./app
    volumes:
      - ./app:/app/
    ports:
      - "8501:8501"
    networks:
      - web_network
      - api_network
  api:
    build: ./api
    volumes:
      - ./api:/app
    ports:
      - "5000:5000"
    networks:
      - api_network
    privileged: true
    runtime: nvidia
networks:
  api_network:
    driver: bridge
  web_network:
    driver: bridge
